<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>假日值班排班系統 (自動接續版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f4f7f6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        @media print {
            .no-print { display: none !important; }
            .print-card { border: 1px solid #e2e8f0 !important; box-shadow: none !important; background: white !important; }
            body { background: white; }
        }
    </style>
</head>
<body>
    <div id="app" class="max-w-7xl mx-auto p-4 sm:p-6 lg:p-8">
        <div class="flex flex-col sm:flex-row justify-between items-center mb-6 pb-4 border-b border-gray-200 no-print">
            <div>
                <h1 class="text-3xl font-bold text-gray-800 tracking-wide">假日值班排班管理系統</h1>
                <p class="text-sm text-gray-500 mt-1">動態擴編與自動接續模組 (離線相容版)</p>
            </div>
            <button onclick="window.print()" class="mt-4 sm:mt-0 px-5 py-2.5 bg-sky-500 text-white rounded-xl shadow-sm hover:bg-sky-600 transition-colors font-medium flex items-center gap-2">
                <span>🖨️</span> 列印本月表格 / 儲存 PDF
            </button>
        </div>

        <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex flex-wrap items-center justify-between gap-4 mb-6 no-print print-card">
            <div class="flex flex-wrap items-center gap-3">
                <span class="text-sm font-bold text-gray-700">選擇年月：</span>
                <select id="yearSelect" onchange="changeYearMonth()" class="px-3 py-1.5 border border-gray-200 rounded-xl text-sm font-medium bg-slate-50 focus:outline-none">
                    <option value="2026">2026 年</option>
                    <option value="2027">2027 年</option>
                </select>
                <select id="monthSelect" onchange="changeYearMonth()" class="px-3 py-1.5 border border-gray-200 rounded-xl text-sm font-medium bg-slate-50 focus:outline-none">
                    </select>

                <button onclick="initializeMonthFramework()" class="px-4 py-1.5 bg-emerald-500 hover:bg-emerald-600 text-white font-medium rounded-xl text-sm transition-colors shadow-2xs">
                    ⚡ 1. 初始化本月框架
                </button>

                <span class="text-xs font-bold text-gray-500 ml-2">接續起點：</span>
                <button onclick="autoDetectStartingPoint(false)" class="text-[11px] bg-amber-100 text-amber-700 hover:bg-amber-200 px-2 py-1.5 rounded-lg transition-colors font-bold shadow-sm" title="根據過去歷史紀錄自動抓取下一位">
                    🎯 自動偵測
                </button>
                <select id="startSvSelect" class="px-2 py-1.5 border border-gray-200 rounded-lg text-xs bg-pink-50/50 focus:outline-none"></select>
                <select id="startStSelect" class="px-2 py-1.5 border border-gray-200 rounded-lg text-xs bg-sky-50/50 focus:outline-none"></select>

                <button onclick="autoFillSequence()" class="px-4 py-1.5 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-xl text-sm transition-colors shadow-2xs flex items-center gap-1">
                    🔄 2. 自動代入當月
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-1 space-y-6 no-print">
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 print-card">
                    <div class="flex justify-between items-center mb-2">
                        <h2 class="text-md font-bold text-gray-700 flex items-center gap-2">
                            <span class="w-2 h-4 bg-pink-400 rounded-full"></span>值班主管順序
                        </h2>
                        <button onclick="addPersonnel('supervisor')" class="text-xs bg-pink-50 text-pink-600 hover:bg-pink-100 px-2 py-1 rounded-lg font-medium transition-colors">
                            ➕ 增加
                        </button>
                    </div>
                    <div id="supervisorList" class="space-y-1.5 max-h-[180px] overflow-y-auto pr-1"></div>
                </div>

                <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 print-card">
                    <div class="flex justify-between items-center mb-2">
                        <h2 class="text-md font-bold text-gray-700 flex items-center gap-2">
                            <span class="w-2 h-4 bg-sky-400 rounded-full"></span>值班人員順序
                        </h2>
                        <button onclick="addPersonnel('staff')" class="text-xs bg-sky-50 text-sky-600 hover:bg-sky-100 px-2 py-1 rounded-lg font-medium transition-colors">
                            ➕ 增加
                        </button>
                    </div>
                    <div id="staffList" class="space-y-1.5 max-h-[240px] overflow-y-auto pr-1"></div>
                </div>

                <div class="bg-gradient-to-br from-slate-50 to-slate-100 p-4 rounded-2xl border border-gray-200 text-xs">
                    <h3 id="statsTitle" class="font-bold text-gray-700 mb-2">📊 當月值班次數</h3>
                    <div class="space-y-2">
                        <div>
                            <span class="font-semibold text-pink-600 block mb-1">主管別</span>
                            <div id="svStats" class="grid grid-cols-2 gap-1"></div>
                        </div>
                        <div class="pt-2 border-t border-gray-200">
                            <span class="font-semibold text-sky-600 block mb-1">人員別</span>
                            <div id="stStats" class="grid grid-cols-2 gap-1 max-h-[120px] overflow-y-auto"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-3 space-y-4">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden print-card">
                    <div id="tableTitle" class="p-4 bg-slate-50 border-b border-gray-200 font-bold text-gray-800">
                        📅 假日值班表
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse text-xs">
                            <thead>
                                <tr class="bg-slate-100/70 border-b border-gray-200 text-gray-600 font-semibold uppercase">
                                    <th class="py-3 px-4 w-28">值班日期</th>
                                    <th class="py-3 px-4 w-24 text-center">狀態 / 星期</th>
                                    <th class="py-3 px-4 w-32">值班主管</th>
                                    <th class="py-3 px-4 w-32">值班人員一</th>
                                    <th class="py-3 px-4 w-32">值班人員二</th>
                                    <th class="py-3 px-4">重大追蹤事項 / 備註</th>
                                    <th class="py-3 px-4 w-12 text-center no-print">操作</th>
                                </tr>
                            </thead>
                            <tbody id="scheduleBody" class="divide-y divide-gray-100 text-gray-700">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 台灣 2026 與 2027 國定假日/補假資料庫
        const TAIWAN_HOLIDAYS = {
            "2026": {
                "01-01": "元旦", "02-16": "除夕", "02-17": "初一", "02-18": "初二", "02-19": "初三", "02-20": "初四",
                "02-27": "228連假", "04-03": "清明連假", "04-06": "清明補假", "05-01": "勞動節", "06-19": "端午節",
                "09-25": "中秋節", "09-28": "教師節", "10-09": "國慶連假", "10-26": "光復補假", "12-25": "行憲節"
            },
            "2027": {
                "01-01": "元旦", "02-04": "小年夜", "02-05": "除夕", "02-08": "初二", "02-09": "初三", "02-10": "初四補",
                "03-01": "228補假", "04-05": "清明節", "04-06": "兒童清明補", "04-30": "勞動補假", "06-09": "端午節",
                "09-15": "中秋節", "09-28": "教師節", "10-11": "國慶補假", "10-25": "光復節", "12-24": "行憲補假"
            }
        };

        let selectedYear = "2026";
        let selectedMonth = "06";

        let supervisors = JSON.parse(localStorage.getItem("dyn_supervisors")) || ["主管1", "主管2", "主管3", "主管4"];
        let staff = JSON.parse(localStorage.getItem("dyn_staff")) || ["人員1", "人員2", "人員3", "人員4", "人員5", "人員6", "人員7", "人員8", "人員9", "人員10"];
        let globalSchedule = JSON.parse(localStorage.getItem("dyn_global_schedule")) || [];

        function saveToStorage() {
            localStorage.setItem("dyn_supervisors", JSON.stringify(supervisors));
            localStorage.setItem("dyn_staff", JSON.stringify(staff));
            localStorage.setItem("dyn_global_schedule", JSON.stringify(globalSchedule));
        }

        // 初始化月份選單
        const monthSelect = document.getElementById("monthSelect");
        for (let i = 1; i <= 12; i++) {
            let m = String(i).padStart(2, '0');
            let opt = document.createElement("option");
            opt.value = m; opt.textContent = m + " 月";
            if (m === selectedMonth) opt.selected = true;
            monthSelect.appendChild(opt);
        }
        document.getElementById("yearSelect").value = selectedYear;

        // 切換年月時，自動渲染並「默默幫你偵測起點」
        function changeYearMonth() {
            selectedYear = document.getElementById("yearSelect").value;
            selectedMonth = document.getElementById("monthSelect").value;
            render();
            autoDetectStartingPoint(true); // true 代表靜默模式，不跳出 alert
        }

        function handlePersonnelChange(type, index, value) {
            if (type === 'supervisor') supervisors[index] = value;
            else staff[index] = value;
            saveToStorage();
            render();
        }

        function addPersonnel(type) {
            if (type === 'supervisor') supervisors.push(`新增主管${supervisors.length + 1}`);
            else staff.push(`新增人員${staff.length + 1}`);
            saveToStorage();
            render();
        }

        function deletePersonnel(type, index) {
            if (type === 'supervisor') {
                if (supervisors.length <= 1) return;
                supervisors.splice(index, 1);
            } else {
                if (staff.length <= 2) return;
                staff.splice(index, 1);
            }
            saveToStorage();
            render();
        }

        function handleScheduleChange(dateId, field, value) {
            globalSchedule = globalSchedule.map(item => item.date === dateId ? { ...item, [field]: value } : item);
            saveToStorage();
            renderStats();
        }

        function deleteDate(dateId) {
            globalSchedule = globalSchedule.filter(item => item.date !== dateId);
            saveToStorage();
            render();
        }

        function initializeMonthFramework() {
            const yearNum = parseInt(selectedYear);
            const monthNum = parseInt(selectedMonth);
            const daysInMonth = new Date(yearNum, monthNum, 0).getDate();
            const daysOfWeekArr = ["日", "一", "二", "三", "四", "五", "六"];
            const generatedRows = [];

            for (let d = 1; d <= daysInMonth; d++) {
                const dString = String(d).padStart(2, '0');
                const fullDateStr = `${selectedYear}-${selectedMonth}-${dString}`;
                const mmdd = `${selectedMonth}-${dString}`;
                const dateObj = new Date(yearNum, monthNum - 1, d);
                const dayOfWeek = daysOfWeekArr[dateObj.getDay()];
                const holidayName = TAIWAN_HOLIDAYS[selectedYear]?.[mmdd] || "";
                const isHoliday = holidayName !== "";
                const isSaturday = dayOfWeek === "六";

                if (isSaturday || isHoliday) {
                    const existingRecord = globalSchedule.find(item => item.date === fullDateStr);
                    if (existingRecord) {
                        generatedRows.push(existingRecord);
                    } else {
                        generatedRows.push({
                            id: fullDateStr, date: fullDateStr, dayOfWeek: dayOfWeek,
                            isHoliday: isHoliday, holidayName: holidayName,
                            supervisor: "", staff1: "", staff2: "",
                            notes: holidayName ? `國定假日 (${holidayName})` : ""
                        });
                    }
                }
            }

            const otherMonthsRecords = globalSchedule.filter(item => !item.date.startsWith(`${selectedYear}-${selectedMonth}`));
            globalSchedule = [...otherMonthsRecords, ...generatedRows].sort((a, b) => new Date(a.date) - new Date(b.date));
            saveToStorage();
            render();
        }

        function updateStartSelectors() {
            const svSelect = document.getElementById("startSvSelect");
            const stSelect = document.getElementById("startStSelect");
            if(!svSelect || !stSelect) return;

            const prevSv = svSelect.value;
            const prevSt = stSelect.value;

            svSelect.innerHTML = supervisors.map(sv => `<option value="${sv}">${sv}</option>`).join('');
            stSelect.innerHTML = staff.map(st => `<option value="${st}">${st}</option>`).join('');

            if (supervisors.includes(prevSv)) svSelect.value = prevSv;
            if (staff.includes(prevSt)) stSelect.value = prevSt;
        }

        // ⭐ 新增的核心功能：自動尋找歷史接續點
        function autoDetectStartingPoint(silent = false) {
            const targetPrefix = `${selectedYear}-${selectedMonth}`;
            
            // 尋找全域紀錄中，日期「小於」本月1號，且「已有安排主管」的歷史紀錄
            const pastRecords = globalSchedule.filter(item => item.date < `${targetPrefix}-01` && item.supervisor !== "");
            
            if (pastRecords.length === 0) {
                if (!silent) alert("目前找不到在此月份之前的排班紀錄，將預設為名單的第一位。");
                return;
            }

            // 由大到小排序，抓取離目前最近的一天（最後排班日）
            pastRecords.sort((a, b) => new Date(b.date) - new Date(a.date));
            const lastRecord = pastRecords[0];

            // 尋找最後一天的主管，以及「人員二（當天最後輪到的基層）」在現有名單的索引位置
            let svIdx = supervisors.indexOf(lastRecord.supervisor);
            let stIdx = staff.indexOf(lastRecord.staff2);

            const svSelect = document.getElementById("startSvSelect");
            const stSelect = document.getElementById("startStSelect");

            // 如果名單裡還找得到這個人，就順延加 1 ( % 總人數作為循環)
            if (svIdx !== -1 && svSelect) {
                svSelect.value = supervisors[(svIdx + 1) % supervisors.length];
            }
            if (stIdx !== -1 && stSelect) {
                stSelect.value = staff[(stIdx + 1) % staff.length];
            }

            if (!silent) alert(`已自動抓取！\n上一筆排班為 ${lastRecord.date}。\n為您接續排定下一位主管與人員。`);
        }

        function autoFillSequence() {
            const prefix = `${selectedYear}-${selectedMonth}`;
            const currentMonthItems = globalSchedule.filter(item => item.date.startsWith(prefix));
            
            if (currentMonthItems.length === 0) {
                alert("請先點擊『初始化本月框架』再進行自動代入！");
                return;
            }
            if (supervisors.length === 0 || staff.length < 2) {
                alert("請確保至少有 1 位主管與 2 位以上的人員名單！");
                return;
            }

            const startSvName = document.getElementById("startSvSelect").value;
            const startStName = document.getElementById("startStSelect").value;

            let svPointer = supervisors.indexOf(startSvName);
            let stPointer = staff.indexOf(startStName);

            if (svPointer === -1) svPointer = 0;
            if (stPointer === -1) stPointer = 0;

            const updatedMonthItems = currentMonthItems.map((item) => {
                const assignedSupervisor = supervisors[svPointer];
                const assignedStaff1 = staff[stPointer];
                const assignedStaff2 = staff[(stPointer + 1) % staff.length];

                svPointer = (svPointer + 1) % supervisors.length;
                stPointer = (stPointer + 2) % staff.length;

                return {
                    ...item,
                    supervisor: assignedSupervisor || "",
                    staff1: assignedStaff1 || "",
                    staff2: assignedStaff2 || ""
                };
            });

            const otherMonthsRecords = globalSchedule.filter(item => !item.date.startsWith(prefix));
            globalSchedule = [...otherMonthsRecords, ...updatedMonthItems].sort((a, b) => new Date(a.date) - new Date(b.date));

            saveToStorage();
            render();
        }

        function renderStats() {
            const prefix = `${selectedYear}-${selectedMonth}`;
            const currentFiltered = globalSchedule.filter(item => item.date.startsWith(prefix));

            const supervisorCounts = {}; const staffCounts = {};
            supervisors.forEach(s => supervisorCounts[s] = 0);
            staff.forEach(st => staffCounts[st] = 0);

            currentFiltered.forEach(item => {
                if (item.supervisor && supervisorCounts[item.supervisor] !== undefined) supervisorCounts[item.supervisor]++;
                if (item.staff1 && staffCounts[item.staff1] !== undefined) staffCounts[item.staff1]++;
                if (item.staff2 && staffCounts[item.staff2] !== undefined) staffCounts[item.staff2]++;
            });

            document.getElementById("statsTitle").textContent = `📊 ${selectedYear}年${selectedMonth}月 當月值班次數`;
            
            document.getElementById("svStats").innerHTML = supervisors.map(sv => `
                <div class="bg-white p-1 rounded border border-gray-100 flex justify-between truncate">
                    <span>${sv}</span><span class="font-bold">${supervisorCounts[sv] || 0}次</span>
                </div>
            `).join('');

            document.getElementById("stStats").innerHTML = staff.map(st => `
                <div class="bg-white p-1 rounded border border-gray-100 flex justify-between truncate">
                    <span>${st}</span><span class="font-bold">${staffCounts[st] || 0}次</span>
                </div>
            `).join('');
        }

        function render() {
            document.getElementById("supervisorList").innerHTML = supervisors.map((sv, idx) => `
                <div class="flex items-center gap-1 text-xs">
                    <span class="text-gray-400 w-10 font-mono">#${idx+1}</span>
                    <input type="text" value="${sv}" onchange="handlePersonnelChange('supervisor', ${idx}, this.value)" class="w-full px-2 py-1 border border-gray-200 rounded" />
                    <button onclick="deletePersonnel('supervisor', ${idx})" class="text-gray-300 hover:text-red-500 px-1">❌</button>
                </div>
            `).join('');

            document.getElementById("staffList").innerHTML = staff.map((st, idx) => `
                <div class="flex items-center gap-1 text-xs">
                    <span class="text-gray-400 w-10 font-mono">#${idx+1}</span>
                    <input type="text" value="${st}" onchange="handlePersonnelChange('staff', ${idx}, this.value)" class="w-full px-2 py-1 border border-gray-200 rounded" />
                    <button onclick="deletePersonnel('staff', ${idx})" class="text-gray-300 hover:text-red-500 px-1">❌</button>
                </div>
            `).join('');

            document.getElementById("tableTitle").textContent = `📅 ${selectedYear} 年 ${selectedMonth} 月 假日值班表`;
            const prefix = `${selectedYear}-${selectedMonth}`;
            const currentFiltered = globalSchedule.filter(item => item.date.startsWith(prefix));
            const tbody = document.getElementById("scheduleBody");

            if (currentFiltered.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7" class="text-center py-12 text-gray-400">
                            本月份尚未初始化框架。<br/>
                            <button onclick="initializeMonthFramework()" class="mt-2 px-3 py-1 bg-emerald-50 text-emerald-600 border border-emerald-200 rounded-xl hover:bg-emerald-100 font-medium">
                                ✨ 點此一鍵建立本月框架
                            </button>
                        </td>
                    </tr>`;
            } else {
                tbody.innerHTML = currentFiltered.map(item => {
                    const svOptions = supervisors.map(sv => `<option value="${sv}" ${item.supervisor === sv ? 'selected' : ''}>${sv}</option>`).join('');
                    const st1Options = staff.map(st => `<option value="${st}" ${item.staff1 === st ? 'selected' : ''}>${st}</option>`).join('');
                    const st2Options = staff.map(st => `<option value="${st}" ${item.staff2 === st ? 'selected' : ''}>${st}</option>`).join('');
                    const statusTag = item.isHoliday ? (item.holidayName || "國定假日") : `週${item.dayOfWeek}`;
                    const tagClass = item.isHoliday ? "bg-rose-100 text-rose-700 border border-rose-200" : "bg-amber-100 text-amber-700";

                    return `
                        <tr class="hover:bg-slate-50/40">
                            <td class="py-2.5 px-4 font-mono font-medium text-gray-900">${item.date}</td>
                            <td class="py-2.5 px-4 text-center">
                                <span class="px-2 py-0.5 rounded text-[11px] font-bold block truncate max-w-[100px] mx-auto ${tagClass}">
                                    ${statusTag}
                                </span>
                            </td>
                            <td class="p-1">
                                <select onchange="handleScheduleChange('${item.date}', 'supervisor', this.value)" class="w-full bg-pink-50/30 border border-pink-200/50 rounded-lg px-1.5 py-1 focus:ring-2 focus:ring-pink-300">
                                    <option value="">-- 主管 --</option>${svOptions}
                                </select>
                            </td>
                            <td class="p-1">
                                <select onchange="handleScheduleChange('${item.date}', 'staff1', this.value)" class="w-full bg-sky-50/30 border border-sky-200/50 rounded-lg px-1.5 py-1 focus:ring-2 focus:ring-sky-300">
                                    <option value="">-- 人員一 --</option>${st1Options}
                                </select>
                            </td>
                            <td class="p-1">
                                <select onchange="handleScheduleChange('${item.date}', 'staff2', this.value)" class="w-full bg-sky-50/30 border border-sky-200/50 rounded-lg px-1.5 py-1 focus:ring-2 focus:ring-sky-300">
                                    <option value="">-- 人員二 --</option>${st2Options}
                                </select>
                            </td>
                            <td class="p-1">
                                <input type="text" value="${item.notes || ''}" placeholder="交辦/追蹤事項..." onchange="handleScheduleChange('${item.date}', 'notes', this.value)" class="w-full border border-gray-200 rounded-lg px-2 py-1 placeholder-gray-300" />
                            </td>
                            <td class="p-1 text-center no-print">
                                <button onclick="deleteDate('${item.date}')" class="text-gray-300 hover:text-red-500">🗑️</button>
                            </td>
                        </tr>`;
                }).join('');
            }

            renderStats();
            updateStartSelectors();
        }

        render();
    </script>
</body>
</html>
